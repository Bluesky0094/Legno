<header class="site-header" id="top">
  <div class="container site-header-inner">
    <a class="brand" data-route="home" aria-label="Vai alla home di F.lli Rinaldi Legnami">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">
        <span class="brand-name" data-field="brand.name"></span>
        <span class="brand-tagline" data-field="brand.tagline"></span>
      </span>
    </a>

    <nav id="mainNav" class="main-nav" aria-label="Navigazione principale">
      <ul class="nav-list" data-list="nav" data-render="nav"></ul>
    </nav>

    <a class="header-phone" data-contact-link="phone">
      <span data-field="contact.phoneDisplay"></span>
    </a>

    <button
      id="menuToggle"
      class="menu-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="mainNav"
      aria-label="Apri menu di navigazione"
    >
      <span class="menu-line"></span>
      <span class="menu-line"></span>
      <span class="menu-line"></span>
    </button>
  </div>
</header>
